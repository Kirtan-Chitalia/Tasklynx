services:

  postgres:
    image: postgres:16-alpine
    container_name: pm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmplatform}
      POSTGRES_USER: ${POSTGRES_USER:-pmadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./postgres/constraints.sql:/docker-entrypoint-initdb.d/02_constraints.sql:ro
      - ./postgres/indexes.sql:/docker-entrypoint-initdb.d/03_indexes.sql:ro
      - ./postgres/triggers.sql:/docker-entrypoint-initdb.d/04_triggers.sql:ro
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/05_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmadmin} -d ${POSTGRES_DB:-pmplatform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pmadmin}:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/${POSTGRES_DB:-pmplatform}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
