version: "3.9"

# =============================================================================
# AI-Native PM Platform — Docker Compose (Production-Grade)
# =============================================================================
# Run: docker compose up -d
# Reset DB: docker compose down -v && docker compose up -d
# =============================================================================

networks:
  pm_backend:
    driver: bridge
  pm_agents:
    driver: bridge
  pm_monitoring:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  qdrant_data:
  minio_data:
  prometheus_data:
  grafana_data:
  langfuse_data:

x-common-env: &common-env
  TZ: UTC
  NODE_ENV: production

x-restart-policy: &restart-policy
  restart: unless-stopped

services:

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE: PostgreSQL 16 + pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pm_postgres
    <<: *restart-policy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pmplatform}
      POSTGRES_USER: ${POSTGRES_USER:-pmadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./postgres/constraints.sql:/docker-entrypoint-initdb.d/02_constraints.sql:ro
      - ./postgres/indexes.sql:/docker-entrypoint-initdb.d/03_indexes.sql:ro
      - ./postgres/triggers.sql:/docker-entrypoint-initdb.d/04_triggers.sql:ro
      - ./postgres/functions.sql:/docker-entrypoint-initdb.d/05_functions.sql:ro
      - ./postgres/views.sql:/docker-entrypoint-initdb.d/06_views.sql:ro
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/07_seed.sql:ro
    networks:
      - pm_backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pmadmin} -d ${POSTGRES_DB:-pmplatform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
        -c max_connections=500
        -c shared_buffers=512MB
        -c effective_cache_size=2GB
        -c work_mem=16MB
        -c maintenance_work_mem=256MB
        -c wal_level=replica
        -c max_wal_senders=3

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE: Redis (session cache, pub/sub, rate limiting)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: pm_redis
    <<: *restart-policy
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pm_backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE: Zookeeper (required by Kafka)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: pm_zookeeper
    <<: *restart-policy
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - pm_backend
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE: Apache Kafka (event streaming, A2A messaging)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: pm_kafka
    <<: *restart-policy
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - pm_backend
      - pm_agents
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE: Qdrant (high-scale vector DB for enterprise tenants)
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.1
    container_name: pm_qdrant
    <<: *restart-policy
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - pm_backend
      - pm_agents
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE: MinIO (S3-compatible object storage for attachments)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: pm_minio
    <<: *restart-policy
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - pm_backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MONITORING: Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: pm_prometheus
    <<: *restart-policy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pm_monitoring
      - pm_backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # MONITORING: Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: pm_grafana
    <<: *restart-policy
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - pm_monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # AI OBSERVABILITY: Langfuse (LLM trace tracking)
  # ---------------------------------------------------------------------------
  langfuse:
    image: langfuse/langfuse:2
    container_name: pm_langfuse
    <<: *restart-policy
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET}
      SALT: ${LANGFUSE_SALT}
    ports:
      - "3002:3000"
    networks:
      - pm_backend
      - pm_monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/public/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # APPLICATION: Frontend (Next.js)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: pm_frontend
    <<: *restart-policy
    depends_on:
      api:
        condition: service_healthy
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:4000}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://api:4000}
    ports:
      - "3000:3000"
    networks:
      - pm_backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # APPLICATION: API Gateway (ASP.NET Core)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pm_api
    <<: *restart-policy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgreSQL: Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD}
      Kafka__BootstrapServers: kafka:9092
      JWT__Secret: ${JWT_SECRET}
      JWT__Issuer: ${JWT_ISSUER:-pmplatform}
      JWT__ExpiryMinutes: 60
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "4000:4000"
    networks:
      - pm_backend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # APPLICATION: AI Orchestrator (LangGraph coordinator)
  # ---------------------------------------------------------------------------
  ai_orchestrator:
    build:
      context: ./apps/ai_orchestrator
      dockerfile: Dockerfile
    container_name: pm_ai_orchestrator
    <<: *restart-policy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST: http://langfuse:3000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - pm_backend
      - pm_agents
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # AGENT SERVICES (each isolated, communicates via Kafka + A2A)
  # ---------------------------------------------------------------------------
  agent_developer:
    build:
      context: ./apps/agents/developer
      dockerfile: Dockerfile
    container_name: pm_agent_developer
    <<: *restart-policy
    depends_on:
      ai_orchestrator:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY}
    networks:
      - pm_agents
      - pm_backend

  agent_sprint_planner:
    build:
      context: ./apps/agents/sprint_planner
      dockerfile: Dockerfile
    container_name: pm_agent_sprint_planner
    <<: *restart-policy
    depends_on:
      ai_orchestrator:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - pm_agents
      - pm_backend

  agent_devops:
    build:
      context: ./apps/agents/devops
      dockerfile: Dockerfile
    container_name: pm_agent_devops
    <<: *restart-policy
    depends_on:
      ai_orchestrator:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      KUBERNETES_API_URL: ${KUBERNETES_API_URL}
      KUBERNETES_TOKEN: ${KUBERNETES_TOKEN}
      PAGERDUTY_API_KEY: ${PAGERDUTY_API_KEY}
    networks:
      - pm_agents
      - pm_backend

  agent_security:
    build:
      context: ./apps/agents/security
      dockerfile: Dockerfile
    container_name: pm_agent_security
    <<: *restart-policy
    depends_on:
      ai_orchestrator:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    networks:
      - pm_agents
      - pm_backend

  # ---------------------------------------------------------------------------
  # APPLICATION: Analytics Service
  # ---------------------------------------------------------------------------
  analytics_service:
    build:
      context: ./apps/analytics
      dockerfile: Dockerfile
    container_name: pm_analytics
    <<: *restart-policy
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - pm_backend
      - pm_agents

  # ---------------------------------------------------------------------------
  # APPLICATION: Notification Service
  # ---------------------------------------------------------------------------
  notification_service:
    build:
      context: ./apps/notifications
      dockerfile: Dockerfile
    container_name: pm_notifications
    <<: *restart-policy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    networks:
      - pm_backend
